<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noble Bookstore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('books') }}">
            📚 Noble Bookstore
        </a>

        <div>
            {% if session.get('user') %}
                <span class="me-3 text-white">
                    {{ session['user'] }}
                </span>

                {% if session.get('role') == 'admin' %}
                    <a href="{{ url_for('dashboard') }}" class="btn btn-warning btn-sm me-2">
                        Admin
                    </a>
                {% endif %}

                <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">
                    Logout
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-light btn-sm">
                    Login
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div>
    {% block content %}{% endblock %}
</div>

</body>
</html>
