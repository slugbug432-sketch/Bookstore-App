{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Suppliers</h2>
    <form method="POST" action="{{ url_for('add_supplier') }}" class="mb-3">
        <div class="row">
            <div class="col-md-4">
                <input type="text" name="name" placeholder="Supplier Name" class="form-control" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="contact" placeholder="Contact Info" class="form-control">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success">Add Supplier</button>
            </div>
        </div>
    </form>

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
            </tr>
        </thead>
        <tbody>
            {% for supplier in suppliers %}
            <tr>
                <td>{{ supplier.name }}</td>
                <td>{{ supplier.contact }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
