{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Purchase Orders</h2>
    <form method="POST" action="{{ url_for('add_purchase_order') }}" class="mb-3">
        <div class="row">
            <div class="col-md-4">
                <select name="book_id" class="form-control">
                    {% for book in books %}
                    <option value="{{ book.id }}">{{ book.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" name="quantity" placeholder="Quantity" class="form-control" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success">Add Order</button>
            </div>
        </div>
    </form>

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>Book</th>
                <th>Quantity</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.book_id }}</td>
                <td>{{ order.quantity }}</td>
                <td>{{ order.date.strftime("%Y-%m-%d") }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
