{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Low Stock Books (Threshold: {{ threshold }})</h2>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>Title</th>
                <th>ISBN</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr class="table-warning">
                <td>{{ book.title }}</td>
                <td>{{ book.isbn }}</td>
                <td>{{ book.quantity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
