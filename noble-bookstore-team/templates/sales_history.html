{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Sales History</h2>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>Date</th>
                <th>Subtotal</th>
                <th>Tax</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for sale in sales %}
            <tr>
                <td>{{ sale.date.strftime("%Y-%m-%d %H:%M") }}</td>
                <td>${{ "%.2f"|format(sale.subtotal) }}</td>
                <td>${{ "%.2f"|format(sale.tax) }}</td>
                <td>${{ "%.2f"|format(sale.total) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
